<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Admin — Evento | Arena Pernambuco</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div th:replace="~{fragments :: header}"></div>

<main class="container" style="padding: 2rem 1rem; max-width: 800px;">
  <h1 class="section-title"
      th:text="${eventoId != null} ? 'Editar Evento' : 'Novo Evento'">Evento</h1>

  <form th:action="${eventoId != null} ? @{/admin/eventos/{id}/editar(id=${eventoId})} : @{/admin/eventos/novo}"
        th:object="${form}"
        method="post"
        style="display:flex; flex-direction:column; gap:1.5rem;">

    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

    <div>
      <label for="titulo">Título *</label>
      <input id="titulo" type="text" th:field="*{titulo}" class="form-control"
             th:classappend="${#fields.hasErrors('titulo')} ? 'is-invalid' : ''"/>
      <span class="error-msg" th:if="${#fields.hasErrors('titulo')}"
            th:errors="*{titulo}"></span>
    </div>

    <div>
      <label for="categoria">Categoria *</label>
      <select id="categoria" th:field="*{categoria}" class="form-control"
              th:classappend="${#fields.hasErrors('categoria')} ? 'is-invalid' : ''">
        <option value="">Selecione...</option>
        <option th:each="cat : ${categorias}" th:value="${cat}" th:text="${cat}">Cat</option>
      </select>
      <span class="error-msg" th:if="${#fields.hasErrors('categoria')}"
            th:errors="*{categoria}"></span>
    </div>

    <div>
      <label for="dataHora">Data e Hora *</label>
      <input id="dataHora" type="datetime-local" th:field="*{dataHora}" class="form-control" data-arena-calendar
             th:classappend="${#fields.hasErrors('dataHora')} ? 'is-invalid' : ''"/>
      <span class="error-msg" th:if="${#fields.hasErrors('dataHora')}"
            th:errors="*{dataHora}"></span>
    </div>

    <div>
      <label for="descricaoCurta">Descrição Curta</label>
      <input id="descricaoCurta" type="text" th:field="*{descricaoCurta}" class="form-control"/>
    </div>

    <div>
      <label for="descricaoCompleta">Descrição Completa</label>
      <textarea id="descricaoCompleta" th:field="*{descricaoCompleta}" class="form-control"
                rows="5"></textarea>
    </div>

    <div>
      <label for="imagemUrl">URL da Imagem</label>
      <input id="imagemUrl" type="url" th:field="*{imagemUrl}" class="form-control"/>
    </div>

    <div>
      <label for="codigoVerificacao">Código de Verificação</label>
      <input id="codigoVerificacao" type="text" th:field="*{codigoVerificacao}" class="form-control"
             placeholder="Deixe vazio para gerar automaticamente"/>
    </div>

    <div style="display:flex; align-items:center; gap:0.5rem;">
      <input id="ativo" type="checkbox" th:field="*{ativo}"/>
      <label for="ativo" style="margin:0;">Evento ativo</label>
    </div>

    <div style="display:flex; gap:1rem;">
      <button type="submit" class="btn btn-primary">Salvar</button>
      <a th:href="@{/admin/eventos}" class="btn btn-secondary">Cancelar</a>
    </div>
  </form>
</main>

<div th:replace="~{fragments :: footer}"></div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
