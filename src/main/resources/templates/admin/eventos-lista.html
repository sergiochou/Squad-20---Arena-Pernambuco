<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Admin - Eventos | Arena Pernambuco</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div th:replace="~{fragments :: header}"></div>

<main class="admin-page">
  <div class="admin-toolbar">
    <div>
      <p class="admin-kicker">Painel administrativo</p>
      <h1 class="page-title">Gerenciar Eventos</h1>
    </div>
    <a th:href="@{/admin/eventos/novo}" class="btn btn--primary admin-create-event">Novo Evento</a>
  </div>

  <div th:if="${#lists.isEmpty(eventos)}" class="admin-empty-state">
    <p>Nenhum evento cadastrado.</p>
  </div>

  <div th:unless="${#lists.isEmpty(eventos)}" class="admin-table-wrap">
    <table class="admin-table">
      <thead>
        <tr>
          <th>T&iacute;tulo</th>
          <th>Categoria</th>
          <th>Data</th>
          <th>Ativo</th>
          <th>A&ccedil;&otilde;es</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="evento : ${eventos}">
          <td class="admin-table__title" th:text="${evento.titulo}">T&iacute;tulo</td>
          <td><span class="badge badge--accent" th:text="${evento.categoria}">Categoria</span></td>
          <td th:text="${evento.dataFormatada}">Data</td>
          <td>
            <span th:class="${evento.ativo} ? 'badge badge--success' : 'badge badge--danger'"
                  th:text="${evento.ativo} ? 'Sim' : 'Não'">Sim</span>
          </td>
          <td>
            <div class="admin-actions">
              <a th:href="@{/admin/eventos/{id}/editar(id=${evento.id})}" class="btn btn--secondary btn--sm">Editar</a>
              <form th:action="@{/admin/eventos/{id}/remover(id=${evento.id})}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn btn--danger btn--sm"
                        onclick="return confirm('Confirmar remo&ccedil;&atilde;o?')">Remover</button>
              </form>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</main>

<div th:replace="~{fragments :: footer}"></div>
</body>
</html>
