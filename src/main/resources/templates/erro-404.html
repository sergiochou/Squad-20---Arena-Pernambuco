<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>404 — Página não encontrada</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div th:replace="~{fragments :: header}"></div>

<main>
  <div class="error-page">
    <h1>404</h1>
    <p>Página não encontrada</p>
    <p th:if="${mensagem}" th:text="${mensagem}" class="text-muted"></p>
    <div style="display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; margin-top: 1rem;">
      <a th:href="@{/}" class="btn btn--primary">Voltar ao início</a>
      <a th:href="@{/eventos}" class="btn btn--ghost">Ver eventos</a>
    </div>
  </div>
</main>

<div th:replace="~{fragments :: footer}"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://unpkg.com/lenis@1/dist/lenis.min.js"></script>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
