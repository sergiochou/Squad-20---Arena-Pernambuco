<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title th:text="${evento.titulo} + ' — Arena Pernambuco'">Evento — Arena Pernambuco</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet"/>
  <style>
    .detalhe-hero {
      position: relative;
      min-height: 50vh;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 3rem 2.5rem;
      margin-bottom: 2rem;
      border-radius: var(--radius-lg);
      overflow: hidden;
      background-size: cover;
      background-position: center;
      background-color: var(--bg-card);
    }
    .detalhe-hero::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(10, 10, 15, 0.3) 0%, rgba(10, 10, 15, 0.85) 100%);
      pointer-events: none;
    }
    .detalhe-hero > * {
      position: relative;
      z-index: 1;
    }
    .detalhe-hero h1 {
      font-size: clamp(2.5rem, 7vw, 4.5rem);
      line-height: 1;
      margin-bottom: 1rem;
    }
    .detalhe-content {
      max-width: 800px;
    }
    .detalhe-content p {
      font-size: 1.05rem;
      line-height: 1.8;
      margin-bottom: 1.5rem;
    }
    .detalhe-meta {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 1rem;
      margin-bottom: 0.5rem;
    }
    .detalhe-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      margin-top: 2rem;
    }
  </style>
</head>
<body>
<div th:replace="~{fragments :: header}"></div>

<main>
  <section class="detalhe-hero"
           th:style="'background-image: url(' + ${evento.imagemUrl} + ')'"
           data-aos="fade-in">
    <div class="detalhe-meta">
      <span class="badge" th:text="${evento.categoria}" th:style="'background-color:' + ${evento.badgeCor} + '1a; color:' + ${evento.badgeCor}">Categoria</span>
      <span class="text-muted" th:text="${evento.dataFormatada}">01/01/2026</span>
    </div>
    <h1 th:text="${evento.titulo}">Título do Evento</h1>
  </section>

  <section class="detalhe-content" data-aos="fade-up" data-aos-delay="100">
    <h2>Sobre o evento</h2>
    <p th:text="${evento.descricaoCompleta}">Descrição completa do evento.</p>

    <div class="detalhe-actions">
      <a th:href="@{/verificar}" class="btn btn--primary">Verificar ingresso</a>
      <a th:href="@{/eventos}" class="btn btn--ghost">Voltar aos eventos</a>
    </div>
  </section>
</main>

<div th:replace="~{fragments :: footer}"></div>

<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://unpkg.com/lenis@1/dist/lenis.min.js"></script>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
