<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Login — Arena Pernambuco</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
  <style>
    #tsparticles {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }
    .login-wrapper {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - var(--header-height) - 200px);
    }
    .login-card {
      margin: 2rem auto;
    }
    .login-card h1 {
      font-size: clamp(2rem, 5vw, 2.8rem);
    }
    .login-links {
      text-align: center;
      margin-top: 1.5rem;
    }
    .login-links a {
      font-size: 0.9rem;
    }
    .login-hints {
      margin-top: 1.5rem;
      padding: 1rem;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-md);
      font-size: 0.82rem;
      color: var(--text-muted);
    }
    .login-hints p {
      margin: 0.3rem 0;
      font-size: 0.82rem;
    }
    .login-hints code {
      font-size: 0.8rem;
    }
  </style>
</head>
<body>
<div th:replace="~{fragments :: header}"></div>

<div id="tsparticles"></div>

<main>
  <div class="login-wrapper">
    <div class="login-card">
      <h1 class="text-center">Entrar</h1>

      <div th:if="${param.error}" class="login-error">
        E-mail ou senha inválidos.
      </div>

      <div th:if="${param.logout}" class="login-success">
        Você saiu com sucesso.
      </div>

      <form th:action="@{/login}" method="post">
        <label for="username">E-mail</label>
        <input type="email" id="username" name="username" placeholder="seu@email.com" required autocomplete="email"/>

        <label for="password">Senha</label>
        <input type="password" id="password" name="password" placeholder="Sua senha" required autocomplete="current-password"/>

        <button type="submit" class="btn btn--primary">Entrar</button>
      </form>

      <div class="login-links">
        <a th:href="@{/eventos}">Entrar como visitante</a>
      </div>

      <div class="login-hints">
        <p><strong>Credenciais de demonstração:</strong></p>
        <p>Participante: <code>participante@arena.com</code> / <code>senha123</code></p>
        <p>Admin: <code>admin@arena.com</code> / <code>admin123</code></p>
      </div>
    </div>
  </div>
</main>

<div th:replace="~{fragments :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://unpkg.com/lenis@1/dist/lenis.min.js"></script>
<script th:src="@{/js/main.js}"></script>
<script>
  tsParticles.load("tsparticles", {
    particles: {
      number: { value: 40, density: { enable: true, area: 900 } },
      color: { value: "#FF6B35" },
      shape: { type: "circle" },
      opacity: { value: 0.2, random: true },
      size: { value: 2, random: true },
      links: {
        enable: true,
        distance: 120,
        color: "#FF6B35",
        opacity: 0.1,
        width: 1
      },
      move: {
        enable: true,
        speed: 0.5,
        direction: "none",
        outModes: { default: "bounce" }
      }
    },
    detectRetina: true
  });
</script>
</body>
</html>
